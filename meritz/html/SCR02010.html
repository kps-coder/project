                <th scope="row">주소선택</th>

                    <input type="radio" name="radio03" id="radio03_1" checked><label for="radio03_1">자택</label>

                  <div class="radioInp">
                    <input type="radio" name="radio03" id="radio03_2"><label for="radio03_2">직장</label>

                    <input type="radio" name="radio03" id="radio03_3"><label for="radio03_3">청구지</label>
                  </div>
                </td>
              </tr>
              <tr>
                <th scope="row">주소</th>

        </div>

        <div class="tableWrap">
          <table>
            <colgroup>
              <col style="width: 100px;">
              <col style="width: auto;">
            </colgroup>
            <tbody>
              <tr>
                <th scope="row">보증인명<br>(생년월일)</th>
                <td>김보증(1988.01.23)</td>
              </tr>
              <tr>
                <th scope="row">주소선택</th>
                <td>
                  <div class="radioInp">
                    <input type="radio" name="radio04" id="radio04_1" checked><label for="radio04_1">자택</label>
                  </div>
                  <div class="radioInp">
                    <input type="radio" name="radio04" id="radio04_2"><label for="radio04_2">직장</label>
                  </div>
                  <div class="radioInp">
                    <input type="radio" name="radio04" id="radio04_3"><label for="radio04_3">청구지</label>
                  </div>
                </td>
              </tr>
              <tr>
                <th scope="row">주소</th>
                <td>서울시 영등포구 국제금융로10 Three IFC 23층 (영등포구 여의도동)</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="tableWrap">
          <table>
            <colgroup>
              <col style="width: 100px;">
              <col style="width: auto;">
            </colgroup>
            <tbody>
              <tr>
                <th scope="row">보증인명<br>(생년월일)</th>
                <td>김보증(1988.01.23)</td>
              </tr>
              <tr>
                <th scope="row">주소선택</th>
                <td>
                  <div class="radioInp">
                    <input type="radio" name="radio05" id="radio05_1" checked><label for="radio05_1">자택</label>
                  </div>
                  <div class="radioInp">
                    <input type="radio" name="radio05" id="radio05_2"><label for="radio05_2">직장</label>
                  </div>
                  <div class="radioInp">
                    <input type="radio" name="radio05" id="radio05_3"><label for="radio05_3">청구지</label>
                  </div>
                </td>
              </tr>
              <tr>
                <th scope="row">주소</th>
                <td>서울시 영등포구 국제금융로10 Three IFC 23층 (영등포구 여의도동)</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div><!-- //bottomSheet__body -->
      <button type="button" class="bottomSheet__closeBtn" onclick="bottomSheetClose('#tabCont01')"><span class="blind">닫기</span></button>
    </div><!-- //bottomSheet__container -->
  </div><!-- //bottomSheet -->
  <!-- //바텀시트 : 보증인정보 -->



  <script>
    document.addEventListener('DOMContentLoaded', () => {
      bottomSheetOpen('#tabCont01');
     

      //tab
      const tabLi = document.querySelectorAll('.tab li');
      const tabBtn = document.querySelectorAll('.tab button');
      tabBtn.forEach((elm, i) => {
        elm.addEventListener('click', (e) => {
          const parent = elm.parentElement;
          tabLi.forEach((elm, i) => {
            elm.classList.remove('selected');
          });
          parent.classList.add('selected');
        });
      });
    });

    //바텀시트
    function bottomSheetOpen(id) {
      const sheetId = document.querySelector(id);
      const bottomSheet = document.querySelectorAll('.bottomSheet');

      bottomSheet.forEach((elm, i) => {
        elm.classList.remove('open');
        elm.style.display = 'none'; 
      });
      sheetId.style.display = 'block';
      setTimeout(function(){
        sheetId.classList.add('open');
      }, 100);  
    }

    function bottomSheetClose(id) {
      const sheetId = document.querySelector(id);
      const tabBtn = document.querySelectorAll('.tab button');

      sheetId.classList.remove('open');
      sheetId.style.display = 'none'; 
      
      tabBtn.forEach((elm, i) => {
        elm.parentElement.classList.remove('selected');
      });
    }
  </script>
</body>
