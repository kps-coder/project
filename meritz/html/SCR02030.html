<!DOCTYPE html>
<html lang="ko">
<head>
  <title>meritz 메리츠캐피탈</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no">

  <meta name="keywords" content="메리츠캐피탈">
  <meta name="description" content="메리츠캐피탈">

  <link type="text/css" rel="stylesheet" href="../css/common.css">
</head>
<body>
  <div class="wrapper">
    <!-- header -->
    <header class="header">
      <h1 class="header__logo"><span class="blind">meritz 메리츠캐피탈</span></h1>
      <div class="utility">
        <div class="log">
          <dl>
            <dt>채권관리팀</dt>
            <dd>전주현</dd>
          </dl>
        </div>
        <div class="sitemap">
          <button type="button" class="sitemap__btn"><span class="blind">메뉴</span></button>
          <div class="gnb">
            <!-- guide.html에서 확인해주세요 -->
          </div>
        </div>
      </div>
    </header>
    <!-- //header -->

    <div class="container">
      <section class="content-counsel">
        <h2 class="blind">상담관리</h2>

        <div class="tab">
          <ul>
            <li><button type="button" disabled>보증인정보</button></li><!-- 선택시 li class="selected" -->
            <li><button type="button" disabled>법조치내역</button></li>
            <li class="selected"><button type="button" onclick="bottomSheetOpen('#tabCont03')">상담이력</button></li>
            <li><button type="button" disabled>비고</button></li>
          </ul>
        </div>     

      </section><!-- //content-counsel -->
    </div>
  </div>

  <!-- 바텀시트 : 상담이력 -->
  <div class="bottomSheet" id="tabCont03">
    <div class="bottomSheet__container">
      <div class="bottomSheet__head">
        <h1>상담이력</h1>
      </div>
      <div class="bottomSheet__body">
        <div class="searchBox">
          <div class="searchBox__row">
            <div class="dateInpWrap">
              <div class="dateInp">
                <input type="date" id="dateInp02">
              </div>
              <span>~</span>
              <div class="dateInp">
                <input type="date" id="dateInp03">
              </div>
            </div>
          </div>          
          <div class="searchBox__btns">
            <button type="button" class="btn-search">조회</button>
          </div>
        </div>

        <div class="bottomSheet__result">
          <div class="tableWrap">
            <table>
              <colgroup>
                <col style="width: 90px;">
                <col style="width: auto;">
              </colgroup>
              <tbody>
                <tr>
                  <th scope="row">등록일시<br>/등록자</th>
                  <td>2026/04/23 / 전주현</td>
                </tr>
                <tr>
                  <th scope="row">상담내용</th>
                  <td>
                    <div class="accordionText">                    
                      <div class="accordionText__cont">
                        통화중<br>
                        확대버튼클릭시 확대 되는 것<br>
                        예시를사용 하기  위해 글씨를 많이 적었습니다.<br>
                        상담이력을 클릭하면 텍스트가 다 표기될 수 있을 정도로 확대가 되었으면 합니다.
                      </div>                    
                      <button type="button" class="accordionText__btn"><span class="blind">열기/닫기</span></button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="tableWrap">
            <table>
              <colgroup>
                <col style="width: 90px;">
                <col style="width: auto;">
              </colgroup>
              <tbody>
                <tr>
                  <th scope="row">등록일시<br>/등록자</th>
                  <td>2026/04/23 / 전주현</td>
                </tr>
                <tr>
                  <th scope="row">상담내용</th>
                  <td>통화중</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div><!-- //bottomSheet__body -->
      <button type="button" class="bottomSheet__closeBtn" onclick="bottomSheetClose('#tabCont03')"><span class="blind">닫기</span></button>
    </div><!-- //bottomSheet__container -->
  </div><!-- //bottomSheet -->
  <!-- //바텀시트 : 상담이력 -->



  <script>
    document.addEventListener('DOMContentLoaded', () => {
      bottomSheetOpen('#tabCont03');

      //date 오늘 날짜 셋팅
      const today = new Date().toISOString().split('T')[0];
      const daetInp = document.querySelectorAll('.dateInp input');
      daetInp.forEach((elm, i) => {
         elm.value = today;
      });

      //tab
      const tabLi = document.querySelectorAll('.tab li');
      const tabBtn = document.querySelectorAll('.tab button');
      tabBtn.forEach((elm, i) => {
        elm.addEventListener('click', (e) => {
          const parent = elm.parentElement;
          tabLi.forEach((elm, i) => {
            elm.classList.remove('selected');
          });
          parent.classList.add('selected');
        });
      });

      //상담내용 펼치기
      const accordionTextBtn = document.querySelectorAll('.accordionText__btn');
      accordionTextBtn.forEach((elm, i) => {
        elm.addEventListener('click', (e) => {
          const parent = e.target.parentElement;
          if(parent.classList[1] == 'open'){
            parent.classList.remove('open');
          } else {
            parent.classList.add('open');
          }
        });
      });
    });

    //바텀시트
    function bottomSheetOpen(id) {
      const sheetId = document.querySelector(id);
      const bottomSheet = document.querySelectorAll('.bottomSheet');

      bottomSheet.forEach((elm, i) => {
        elm.classList.remove('open');
        elm.style.display = 'none'; 
      });
      sheetId.style.display = 'block';
      setTimeout(function(){
        sheetId.classList.add('open');
      }, 100);  
    }

    function bottomSheetClose(id) {
      const sheetId = document.querySelector(id);
      const tabBtn = document.querySelectorAll('.tab button');

      sheetId.classList.remove('open');
      sheetId.style.display = 'none'; 
      
      tabBtn.forEach((elm, i) => {
        elm.parentElement.classList.remove('selected');
      });
    }
  </script>
</body>
</html>
