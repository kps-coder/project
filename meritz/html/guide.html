<!DOCTYPE html>
<html lang="ko">
<head>
  <title>meritz 메리츠캐피탈</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no">

  <meta name="keywords" content="메리츠캐피탈">
  <meta name="description" content="메리츠캐피탈">

  <link type="text/css" rel="stylesheet" href="../css/common.css">

  <!-- 가이드를 위한 css 입니다. :: 사용금지 -->
  <style>
    .guideBox + .guideBox {margin-top:40px;}
    .flexSb {gap: 8px;}
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- header -->
    <header class="header">
      <h1 class="header__logo"><span class="blind">meritz 메리츠캐피탈</span></h1>
      <div class="utility">
        <div class="log">
          <dl>
            <dt>채권관리팀</dt>
            <dd>전주현</dd>
          </dl>
        </div>
        <div class="sitemap">
          <button type="button" class="sitemap__btn"><span class="blind">메뉴</span></button>
          <div class="gnb">
            <div class="gnb__cont">
              <div class="gnb__head">
                <a href="/" class="btn-home"><span class="blind">home</span></a>
                <button type="button" class="btn-gnb-close"><span class="blind">닫기</span></button>
              </div>
              <div class="gnb__title">
                <p>메뉴목록</p>
              </div>
              <ul class="gnb__menu">
                <li><a href="#n">관리건조회</a></li>
                <li><a href="#n">문자수신관리</a></li>
                <li><a href="#n">방문관리</a></li>
              </ul>
              <div class="gnb__foot">
                <a href="#n" class="btn-logout">로그아웃</a>
              </div>
            </div>            
          </div>
        </div>
      </div>
    </header>
    <!-- //header -->

    <div class="container">
      <section class="content">
        <h2 class="blind">가이드</h2>
        
        <div class="guideBox">
          <h3 class="title3">Date</h3>
          <div class="searchBox">
            <div class="searchBox__row">
              <div class="dateInp">
                <input type="date" id="dateInp02">
              </div>
            </div>
            <div class="searchBox__row">
              <div class="dateInpWrap">
                <div class="dateInp">
                  <input type="date" id="dateInp02">
                </div>
                <span>~</span>
                <div class="dateInp">
                  <input type="date" id="dateInp03">
                </div>
              </div>
            </div> 
          </div>
        </div>
        <div class="guideBox">
          <h3 class="title3">Input</h3>
          <div class="searchBox">
            <div class="searchBox__row">
              <div class="inpupWrap">
                <input type="text" id="searchBoxInput" class="inpBasic" placeholder="label 없는 경우" title="검색어 입력">
                <button type="button" class="btn-del"><span class="blind">삭제</span></button>
              </div>
            </div>
            <div class="searchBox__row">
              <div class="inpupWrap">
                <label for="searchName">담당자</label>
                <input type="text" id="searchName" class="inpBasic" placeholder="label 있는 경우">
                <button type="button" class="btn-del"><span class="blind">삭제</span></button>
              </div>
            </div> 
            <div class="searchBox__row">
              <div class="citationInp">
                <label for="citationInp">인증번호</label>
                <div class="tooltip">
                  <button type="button" class="tooltip__btn"><span class="blind">툴팁</span></button>
                  <div class="tooltip_cont">
                    <p>툴팁 설명을 넣어주세요.툴팁 설명을 넣어주세요.툴팁 설명을 넣어주세요.툴팁 설명을 넣어주세요.</p>
                    <button type="button" class="tooltip__close"><span class="blind">툴팁</span></button>
                  </div>
                </div>
                <input type="number" id="citationInp" placeholder="입력하세요">
                <button type="button" class="btn-small">인증번호전송</button>
              </div>
            </div>
          </div>
        </div>

        <div class="guideBox">
          <h3 class="title3">Radio</h3>
          <div class="searchBox">
            <div class="searchBox__row">
              <div class="radioBtnsWrap">
                <div class="radioBtn">
                  <input type="radio" id="radioBtn01_1" name="radioBtn01"><label for="radioBtn01_1">버튼형1</label>
                </div>
                <div class="radioBtn">
                  <input type="radio" id="radioBtn01_2" name="radioBtn01"><label for="radioBtn01_2">버튼형2</label>
                </div>
                <div class="radioBtn">
                  <input type="radio" id="radioBtn01_3" name="radioBtn01"><label for="radioBtn01_3">버튼형3</label>
                </div>
              </div>
            </div>
            <div class="searchBox__row">
              <div class="radioInp">
                <input type="radio" name="radio01" id="radio01_1" checked><label for="radio01_1">기본형1</label>
              </div>
              <div class="radioInp">
                <input type="radio" name="radio01" id="radio01_2"><label for="radio01_2">기본형2</label>
              </div>
              <div class="radioInp">
                <input type="radio" name="radio01" id="radio01_3"><label for="radio01_3">기본형3</label>
              </div>
            </div> 
          </div>
        </div>

        <div class="guideBox">
          <h3 class="title3">Checkbox</h3>
          <div class="searchBox">
            <div class="searchBox__row">
              <div class="chechInp">
                <input type="checkbox" id="checkBox01_1" name="checkBox01" checked>
                <label for="checkBox01_1">체크박스1</label>
              </div>
              <div class="chechInp">
                <input type="checkbox" id="checkBox01_2" name="checkBox01">
                <label for="checkBox01_2">체크박스2</label>
              </div>
              <div class="chechInp">
                <input type="checkbox" id="checkBox01_3" name="checkBox01">
                <label for="checkBox01_3">체크박스3</label>
              </div>
            </div> 
          </div>
        </div>

        <div class="guideBox">
          <h3 class="title3">툴팁</h3>
          <span>툴팁입니다.</span>
          <div class="tooltip">
            <button type="button" class="tooltip__btn"><span class="blind">툴팁</span></button>
            <div class="tooltip_cont">
              <p>툴팁 설명을 넣어주세요.툴팁 설명을 넣어주세요.툴팁 설명을 넣어주세요.툴팁 설명을 넣어주세요.</p>
              <button type="button" class="tooltip__close"><span class="blind">툴팁</span></button>
            </div>
          </div>
        </div>

        <div class="guideBox">
          <h3 class="title3">Button</h3>
          <button type="button" class="btn-small">.btn-small</button>
          <br><br>
          <button type="button" class="btn-search">.btn-search</button>
          <br>
          <button type="button" class="btn-cta-pri">.btn-cta-pri</button>
          <br>
          <button type="button" class="btn-cta-sec">.btn-cta-sec</button>
        </div>
      </section>
    </div>
  </div>


  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sitemapBtn = document.querySelector('.sitemap__btn');
      const gnb = document.querySelector('.gnb');
      const gnbMenu = document.querySelector('.gnb__cont');
      const gnbClosdBtn = document.querySelector('.btn-gnb-close');

      sitemapBtn.addEventListener('click', () => {
        gnb.style.display = 'block';
        gnbMenu.style.display = 'block';
        setTimeout(function(){
          gnb.classList.add('open');
        }, 100);        
      });

      gnbClosdBtn.addEventListener('click', () => {
        gnb.classList.remove('open');
        gnbMenu.style.display = 'none'; 
        gnb.style.display = 'none';
      });

      //date 오늘 날짜 셋팅
      const today = new Date().toISOString().split('T')[0];
      const daetInp = document.querySelectorAll('.dateInp input');
      daetInp.forEach((elm, i) => {
         elm.value = today;
      });


      // 툴팁
      const tooltipBtn = document.querySelectorAll('.tooltip__btn');
      const tooltipClose = document.querySelectorAll('.tooltip__close');

      tooltipBtn.forEach((elm, i) => {
        elm.addEventListener('click', (e) => {        
          const parent = e.target.parentElement;
          if(parent.classList[1] == 'open') {
            parent.classList.remove('open');
          } else {
            parent.classList.add('open');
          }        
        });
      });

      tooltipClose.forEach((elm, i) => {
        elm.addEventListener('click', (e) => {
          const parent = e.target.parentElement.parentElement;
          parent.classList.remove('open');
        });
      });     

      

      // input 검색어 삭제
      const inputBox = document.querySelectorAll('.inpupWrap > input');

      inputBox.forEach(function(elm, i){
        elm.addEventListener('input', (e) => {
          let inpDelBtn = e.srcElement.nextElementSibling;
          if (elm.value == ''){
             inpDelBtn.classList.remove('on');
          } else {
            inpDelBtn.classList.add('on');
          }

          inpDelBtn.addEventListener('click', (e) => {
            elm.value = '';
            inpDelBtn.classList.remove('on');
          });
        });
      });
    });
  </script>
</body>
</html>
