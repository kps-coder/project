<!DOCTYPE html>
<html lang="ko">
<head>
  <title>meritz 메리츠캐피탈</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no">

  <meta name="keywords" content="메리츠캐피탈">
  <meta name="description" content="메리츠캐피탈">

  <link type="text/css" rel="stylesheet" href="../css/common.css">
</head>
<body>
  <div class="wrapper">
    <!-- header -->
    <header class="header">
      <h1 class="header__logo"><span class="blind">meritz 메리츠캐피탈</span></h1>
      <div class="utility">
        <div class="log">
          <dl>
            <dt>채권관리팀</dt>
            <dd>전주현</dd>
          </dl>
        </div>
        <div class="sitemap">
          <button type="button" class="sitemap__btn"><span class="blind">메뉴</span></button>
          <div class="gnb">
            <div class="dim"></div>
            <div class="gnb__cont">
              <div class="gnb__head">
                <a href="/" class="btn-home"><span class="blind">home</span></a>
                <button type="button" class="btn-gnb-close"><span class="blind">닫기</span></button>
              </div>
              <div class="gnb__title">
                <p>메뉴목록</p>
              </div>
              <ul class="gnb__menu">
                <li><a href="#n">관리건조회</a></li>
                <li><a href="#n">문자수신관리</a></li>
                <li><a href="#n">방문관리</a></li>
              </ul>
              <div class="gnb__foot">
                <a href="#n" class="btn-logout">로그아웃</a>
              </div>
            </div>            
          </div>
        </div>
      </div>
    </header>
    <!-- //header -->

    <div class="container">
      <section class="content">
        <h2 class="blind">통화내역</h2>
        <div class="callList call__newly">
          
        </div>
      </section>
    </div>
  </div>


  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sitemapBtn = document.querySelector('.sitemap__btn');
      const gnb = document.querySelector('.gnb');
      const gnbMenu = document.querySelector('.gnb__cont');
      const gnbClosdBtn = document.querySelector('.btn-gnb-close');

      sitemapBtn.addEventListener('click', () => {
        gnbMenu.style.display = 'block';
        setTimeout(function(){
          gnb.classList.add('open');
        }, 200);        
      });

      gnbClosdBtn.addEventListener('click', () => {
        gnb.classList.remove('open');
        gnbMenu.style.display = 'none'; 
      });
    });
  </script>
</body>
</html>
