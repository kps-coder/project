<!DOCTYPE html>
<html lang="ko">
<head>
  <title>meritz 메리츠캐피탈</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no">

  <meta name="keywords" content="메리츠캐피탈">
  <meta name="description" content="메리츠캐피탈">

  <link type="text/css" rel="stylesheet" href="../css/common.css">
</head>
<body>
  <div class="wrapper">
    <!-- header -->
    <header class="header">
      <h1 class="header__logo"><span class="blind">meritz 메리츠캐피탈</span></h1>
      <div class="utility">
        <div class="log">
          <dl>
            <dt>채권관리팀</dt>
            <dd>전주현</dd>
          </dl>
        </div>
        <div class="sitemap">
          <button type="button" class="sitemap__btn"><span class="blind">메뉴</span></button>
          <div class="gnb">
            <!-- guide.html에서 확인해주세요 -->
          </div>
        </div>
      </div>
    </header>
    <!-- //header -->

    <div class="container">
      <section class="content">
        <button type="button" class="btn-small" onclick="popLayerOpen('#callInPopLayer');">전화수신시 팝업 열기</button>
      </section><!-- //content -->
    </div>
  </div>

  <!-- 팝업 : 문자전송제한 알람팝업1 -->
  <div class="popLayer" id="callInPopLayer">
    <div class="popLayer__container">
      <div class="popLayer__head">
        <h1>전화 수신</h1>
      </div>
      <div class="popLayer__body">
        <div class="tableWrap">
          <table>
            <colgroup>
              <col style="width: 90px;">
              <col style="width: auto;">
            </colgroup>
            <tbody>
              <tr>
                <th scope="row">전화번호</th>
                <td>010-1111-1111</td>
              </tr>
              <tr>
                <th scope="row">거래처명</th>
                <td>김채무</td>
              </tr>
              <tr>
                <th scope="row">관련실행<br>번호</th>
                <td>PA26060668001 <br>외 1건</td>
              </tr>
              <tr>
                <th scope="row">마지막<br>통화일시</th>
                <td>2026-04-28-9:56</td>
              </tr>
            </tbody>
          </table>
        </div>    
      </div><!-- //popLayer__body -->
      <div class="popLayer__foot">
        <button type="button" class="btn-cta-pri">받기</button>
        <button type="button" class="btn-cta-sec">거절</button>
      </div>
      <button type="button" class="popLayer__closeBtn" onclick="popLayerClose('#callInPopLayer')"><span class="blind">닫기</span></button>
    </div><!-- //popLayer__container -->
  </div><!-- //popLayer -->
  <!-- //팝업 : 문자전송제한 알람팝업1 -->



  <script>
    document.addEventListener('DOMContentLoaded', () => {
      popLayerOpen('#callInPopLayer');
      
      
      // layer 배경 클릭시 닫기
      const popLayer = document.querySelectorAll('.popLayer');
      const popLayerContainer = document.querySelectorAll('.popLayer__container');
      popLayer.forEach((elm, i) => {
        elm.addEventListener('click', (e) => {
          //console.log(e.target.id)
          if(e.target.classList[0] === 'popLayer'){
            popLayerClose('#' + e.target.id);
          }
        });        
      });
    });

    // layer popup
    function popLayerOpen(id) {
      const layerId = document.querySelector(id);
      const bottomSheet = document.querySelectorAll('.bottomSheet');
      const popLayer = document.querySelectorAll('.popLayer');      

      popLayer.forEach((elm, i) => {
        elm.classList.remove('open');
      });
      bottomSheet.forEach((elm, i) => {
        elm.classList.remove('open');
        elm.style.display = 'none'; 
      });
      layerId.classList.add('open'); 
    }

    function popLayerClose(id) {
      const layerId = document.querySelector(id);
      const tabBtn = document.querySelectorAll('.tab button');

      layerId.classList.remove('open');
      
      tabBtn.forEach((elm, i) => {
        elm.parentElement.classList.remove('selected');
      });
    }
  </script>
</body>
</html>
