<!DOCTYPE html>
<html lang="ko">
<head>
  <title>meritz 메리츠캐피탈</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no">

  <meta name="keywords" content="메리츠캐피탈">
  <meta name="description" content="메리츠캐피탈">

  <link type="text/css" rel="stylesheet" href="../css/common.css">
</head>
<body>
  <div class="wrapper">
    <!-- header -->
    <header class="header">
      <h1 class="header__logo"><span class="blind">meritz 메리츠캐피탈</span></h1>
      <div class="utility">
        <div class="log">
          <dl>
            <dt>채권관리팀</dt>
            <dd>전주현</dd>
          </dl>
        </div>
        <div class="sitemap">
          <button type="button" class="sitemap__btn"><span class="blind">메뉴</span></button>
          <div class="gnb">
            <!-- guide.html에서 확인해주세요 -->
          </div>
        </div>
      </div>
    </header>
    <!-- //header -->

    <div class="container">
      <section class="content-counsel">
        <h2 class="blind">상담관리</h2>

        <div class="tab">
          <ul>
            <li><button type="button" disabled>보증인정보</button></li><!-- 선택시 li class="selected" -->
            <li><button type="button" disabled>법조치내역</button></li>
            <li><button type="button" disabled>상담이력</button></li>
            <li><button type="button" disabled>비고</button></li>
          </ul>
        </div>
        
        <div class="counsel__body">
          <div class="counsel__cont">
            <button type="button" class="btn-small" onclick="popLayerOpen('#alertLayer03');">문자전송제한 알람팝업 열기</button>
          </div>          
        </div>

      </section><!-- //content-counsel -->
    </div>
  </div>

  <!-- 팝업 : 문자전송제한 알람팝업1 -->
  <div class="popLayer" id="alertLayer03">
    <div class="popLayer__container">
      <div class="popLayer__head">
        <h1>전송 제한 안내</h1>
      </div>
      <div class="popLayer__body">
        <div class="popLayer__text">
          금일 추심이 불가능한 차주입니다. <br>
          접촉이 필요한 경우 관리자의 승인을 받아 전송 처리 가능합니다.<br>
          화면명 <br>
          머핀> HOME > 채권관리 > 상담관리 > 예외접촉승인관리
        </div>
      </div><!-- //popLayer__body -->
      <div class="popLayer__foot">
        <button type="button" class="btn-cta-pri" onclick="popLayerClose('#alertLayer03')">닫기</button>
      </div>
      <button type="button" class="popLayer__closeBtn" onclick="popLayerClose('#alertLayer03')"><span class="blind">닫기</span></button>
    </div><!-- //popLayer__container -->
  </div><!-- //popLayer -->
  <!-- //팝업 : 문자전송제한 알람팝업1 -->



  <script>
    document.addEventListener('DOMContentLoaded', () => {
      popLayerOpen('#alertLayer03');
      
      
      //date 오늘 날짜 셋팅
      const today = new Date().toISOString().split('T')[0];
      const daetInp = document.querySelectorAll('.dateInp input');
      daetInp.forEach((elm, i) => {
         elm.value = today;
      });
     

      //tab
      const tabLi = document.querySelectorAll('.tab li');
      const tabBtn = document.querySelectorAll('.tab button');
      tabBtn.forEach((elm, i) => {
        elm.addEventListener('click', (e) => {
          const parent = elm.parentElement;
          tabLi.forEach((elm, i) => {
            elm.classList.remove('selected');
          });
          parent.classList.add('selected');
        });
      });

      // layer 배경 클릭시 닫기
      const popLayer = document.querySelectorAll('.popLayer');
      const popLayerContainer = document.querySelectorAll('.popLayer__container');
      popLayer.forEach((elm, i) => {
        elm.addEventListener('click', (e) => {
          //console.log(e.target.id)
          if(e.target.classList[0] === 'popLayer'){
            popLayerClose('#' + e.target.id);
          }
        });        
      });
    });

    //바텀시트
    function bottomSheetOpen(id) {
      const sheetId = document.querySelector(id);
      const bottomSheet = document.querySelectorAll('.bottomSheet');
      const popLayer = document.querySelectorAll('.popLayer');

      popLayer.forEach((elm, i) => {
        elm.classList.remove('open');
      });
      bottomSheet.forEach((elm, i) => {
        elm.classList.remove('open');
        elm.style.display = 'none'; 
      });
      sheetId.style.display = 'block';
      setTimeout(function(){
        sheetId.classList.add('open');
      }, 100);  
    }

    function bottomSheetClose(id) {
      const sheetId = document.querySelector(id);
      const tabBtn = document.querySelectorAll('.tab button');

      sheetId.classList.remove('open');
      sheetId.style.display = 'none'; 
      
      tabBtn.forEach((elm, i) => {
        elm.parentElement.classList.remove('selected');
      });
    }

    // layer popup
    function popLayerOpen(id) {
      const layerId = document.querySelector(id);
      const bottomSheet = document.querySelectorAll('.bottomSheet');
      const popLayer = document.querySelectorAll('.popLayer');      

      popLayer.forEach((elm, i) => {
        elm.classList.remove('open');
      });
      bottomSheet.forEach((elm, i) => {
        elm.classList.remove('open');
        elm.style.display = 'none'; 
      });
      layerId.classList.add('open'); 
    }

    function popLayerClose(id) {
      const layerId = document.querySelector(id);
      const tabBtn = document.querySelectorAll('.tab button');

      layerId.classList.remove('open');
      
      tabBtn.forEach((elm, i) => {
        elm.parentElement.classList.remove('selected');
      });
    }
  </script>
</body>
</html>
