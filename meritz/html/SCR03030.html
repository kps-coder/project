<!DOCTYPE html>
<html lang="ko">
<head>
  <title>meritz 메리츠캐피탈</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no">

  <meta name="keywords" content="메리츠캐피탈">
  <meta name="description" content="메리츠캐피탈">

  <link type="text/css" rel="stylesheet" href="../css/common.css">
</head>
<body>
  <div class="wrapper">
    <!-- header -->
    <header class="header">
      <h1 class="header__logo"><span class="blind">meritz 메리츠캐피탈</span></h1>
      <div class="utility">
        <div class="log">
          <dl>
            <dt>채권관리팀</dt>
            <dd>전주현</dd>
          </dl>
        </div>
        <div class="sitemap">
          <button type="button" class="sitemap__btn"><span class="blind">메뉴</span></button>
          <div class="gnb">
            <!-- guide.html에서 확인해주세요 -->
          </div>
        </div>
      </div>
    </header>
    <!-- //header -->

    <div class="container">
      <section class="content">
        <h2 class="title2">상담이력등록</h2>

        <div class="tableWrap">
          <table>
            <colgroup>
              <col style="width: 105px;">
              <col style="width: auto;">
            </colgroup>
            <tbody>
              <tr>
                <th scope="row">실행번호</th>
                <td>
                  <div class="flexSb">
                    <p>PA2606068001</p>
                    <button type="button" class="btn-medium">신원미상</button>
                  </div>                  
                </td>
              </tr>
              <tr>
                <th scope="row">거래처명<br>(생년월일)</th>
                <td> 김채무(1998.08.23)</td>
              </tr>
              <tr>
                <th scope="row">상담인구분</th>
                <td>
                  <div class="radioInp">
                    <input type="radio" name="radio1" id="radio1_1" checked><label for="radio1_1">계약자</label>
                  </div>
                  <div class="radioInp">
                    <input type="radio" name="radio1" id="radio1_2"><label for="radio1_2">보증인</label>
                  </div>
                  <div class="radioInp">
                    <input type="radio" name="radio1" id="radio1_3"><label for="radio1_3">기타</label>
                  </div>
                </td>
              </tr>
              <tr>
                <th scope="row">상담인성명</th>
                <td>
                  <div class="inpupWrap">
                    <input type="text" id="searchBoxInput" class="inpBasic" placeholder="상담인성명을 입력하세요" title="상담인성명 입력">
                    <button type="button" class="btn-del"><span class="blind">삭제</span></button>
                  </div>
                </td>
              </tr>
              <tr>
                <th scope="row">상담방법</th>
                <td>
                  <div class="radioInp">
                    <input type="radio" name="radio2" id="radio2_1" checked><label for="radio2_1">휴대전화</label>
                  </div>
                  <div class="radioInp">
                    <input type="radio" name="radio2" id="radio2_2"><label for="radio2_2">직장전화</label>
                  </div>
                  <div class="radioInp">
                    <input type="radio" name="radio2" id="radio2_3"><label for="radio2_3">자택전화</label>
                  </div>
                  <div class="radioInp">
                    <input type="radio" name="radio2" id="radio2_4"><label for="radio2_4">기타</label>
                  </div>
                </td>
              </tr>
              <tr>
                <th scope="row">응답상태</th>
                <td>
                  <div class="radioInp">
                    <input type="radio" name="radio3" id="radio3_1" checked><label for="radio3_1">통화</label>
                  </div>
                  <div class="radioInp">
                    <input type="radio" name="radio3" id="radio3_2"><label for="radio3_2">무응답</label>
                  </div>
                  <div class="radioInp">
                    <input type="radio" name="radio3" id="radio3_3"><label for="radio3_3">결번</label>
                  </div>
                </td>
              </tr>
              <tr>
                <th scope="row">상담유형(소)</th>
                <td>
                  <div class="selectInp">
                    <select name="selectInp03" title="SMS제목">
                      <option>소분류 선택</option>
                      <option>나보증02</option>
                    </select>
                  </div>
                </td>
              </tr>
              <tr>
                <th scope="row">상담내용</th>
                <td>
                  <textarea name="textareaInp01" id="textareaInp01" rows="8" class="textareaInp" placeholder="상담내용을 저장하세요"></textarea>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="btnWrap">
          <button type="button" class="btn-cta-pri">등록</button>
        </div>
      </section>
    </div>
  </div>


  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // input 검색어 삭제
      const inputBox = document.querySelectorAll('.inpupWrap > input');

      inputBox.forEach(function(elm, i){
        elm.addEventListener('input', (e) => {
          let inpDelBtn = e.srcElement.nextElementSibling;
          if (elm.value == ''){
             inpDelBtn.classList.remove('on');
          } else {
            inpDelBtn.classList.add('on');
          }

          inpDelBtn.addEventListener('click', (e) => {
            elm.value = '';
            inpDelBtn.classList.remove('on');
          });
        });
      });

      // 조건 검색 열기/닫기
      const searchBoxBtn = document.querySelector('.searchBox__btn');
      searchBoxBtn.addEventListener('click', (e) => {
        const parent = searchBoxBtn.parentElement.parentElement;
        if (parent.classList[1] == 'open') {
          parent.classList.remove('open');
        } else {
          parent.classList.add('open');
        }
      });

    });
  </script>
</body>
</html>
